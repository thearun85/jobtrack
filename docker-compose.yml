services:
  postgres:
    image: postgres:16
    container_name: jobtrack_postgres
    environment:
      - POSTGRES_USER=jobtrack
      - POSTGRES_PASSWORD=jobtrack
      - POSTGRES_DB=jobtrack
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - jobtrack-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtrack -d jobtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jobtrack-pgdata:
